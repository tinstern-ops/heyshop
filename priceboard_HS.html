<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PriceBoard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
[data-theme="light"] {
  --bg: #f4f4f8;
  --s1: #ffffff;
  --s2: #f0f0f5;
  --s3: #e8e8f0;
  --border: #dcdce8;
  --text: #18182a;
  --muted: #7070a0;
  --dim: #b0b0c8;
  --accent: #00a372;
  --accent-dim: rgba(0,163,114,0.1);
  --blue: #2878e0;
  --blue-dim: rgba(40,120,224,0.1);
  --orange: #e05020;
  --orange-dim: rgba(224,80,32,0.1);
  --shadow: 0 1px 4px rgba(0,0,0,.08);
  --shadow-lg: 0 4px 20px rgba(0,0,0,.12);
  --row-best: #f0faf5;
  --row-best-border: #bbf0d8;
  --star: #16a34a;
  --best-text: #166534;
  --diff-text: #dc2626;
  --group-bg: #f5f5fa;
  --group-text: #555;
}
[data-theme="dark"] {
  --bg: #08080e;
  --s1: #111118;
  --s2: #18181f;
  --s3: #22222c;
  --border: #2c2c3a;
  --text: #e0e0ee;
  --muted: #6a6a88;
  --dim: #3a3a52;
  --accent: #00e5a0;
  --accent-dim: rgba(0,229,160,0.1);
  --blue: #4a9eff;
  --blue-dim: rgba(74,158,255,0.1);
  --orange: #ff6b35;
  --orange-dim: rgba(255,107,53,0.1);
  --shadow: 0 1px 4px rgba(0,0,0,.4);
  --shadow-lg: 0 4px 20px rgba(0,0,0,.5);
  --row-best: rgba(0,229,160,0.06);
  --row-best-border: rgba(0,229,160,0.2);
  --star: #00e5a0;
  --best-text: #00e5a0;
  --diff-text: #ff6b35;
  --group-bg: #1a1a24;
  --group-text: #8888aa;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

/* ── HEADER ── */
.hdr{
  background:var(--s1);border-bottom:1px solid var(--border);
  padding:0 20px;height:52px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow);
}
.logo{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.12em;flex-shrink:0;}
.logo em{color:var(--muted);font-style:normal;font-weight:400;}
.search-wrap{position:relative;flex:1;max-width:300px;}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:13px;pointer-events:none;}
#searchInput{width:100%;padding:6px 10px 6px 29px;background:var(--s2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .15s;}
#searchInput:focus{border-color:var(--accent);}
#searchInput::placeholder{color:var(--dim);}
.hright{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;}
.upd{font-family:'Space Mono',monospace;font-size:9px;color:var(--dim);white-space:nowrap;}
.btn{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.06em;padding:5px 11px;border-radius:3px;border:1px solid;cursor:pointer;transition:all .15s;white-space:nowrap;background:transparent;}
.btn-p{background:var(--accent);color:#000;border-color:var(--accent);}
.btn-p:hover{filter:brightness(1.1);}
.btn-b{color:var(--blue);border-color:var(--blue);}
.btn-b:hover{background:var(--blue-dim);}
.btn-g{color:var(--muted);border-color:var(--border);}
.btn-g:hover{color:var(--text);border-color:var(--muted);}
.btn-o{color:var(--orange);border-color:var(--orange);}
.btn-o:hover{background:var(--orange-dim);}
.theme-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--s2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.admin-badge{font-family:'Space Mono',monospace;font-size:9px;color:var(--orange);border:1px solid var(--orange);padding:2px 7px;border-radius:2px;opacity:.8;}

/* ── LOADING BAR ── */
.lbar{height:2px;background:var(--border);}
.lfill{height:100%;background:var(--accent);width:0%;transition:width .35s;}

/* ── TABS ── */
.tabs{background:var(--s1);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:10px 14px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .15s;}
.tab:hover{color:var(--text);}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);}
.tab.admin-tab{color:var(--orange);}
.tab.admin-tab.on{color:var(--orange);border-bottom-color:var(--orange);}

/* ── WRAP ── */
.wrap{max-width:1060px;margin:16px auto;padding:0 16px;}

/* ── BAR DE FILTROS ── */
.bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
.bar select{height:32px;padding:0 10px;border:1px solid var(--border);border-radius:5px;font-size:13px;background:var(--s1);color:var(--text);cursor:pointer;outline:none;}
.leg{display:flex;gap:8px;margin-left:auto;align-items:center;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);}
.dot8{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;background:var(--s1);border-radius:8px;overflow:hidden;box-shadow:var(--shadow);font-size:13px;}
th{background:var(--s2);padding:7px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr.g td{background:var(--group-bg);font-weight:600;font-size:11px;color:var(--group-text);text-transform:uppercase;letter-spacing:.04em;padding:5px 10px;border-top:2px solid var(--border);}
tr.best td{background:var(--row-best);}
tr.best .pv{color:var(--best-text);font-weight:700;}
.star{color:var(--star);font-size:11px;margin-right:2px;}
.pv{font-size:13px;font-weight:600;}
.lp{font-size:11px;color:var(--dim);text-decoration:line-through;margin-right:4px;}
.ok{font-size:11px;color:var(--star);font-weight:500;}
.dn{font-size:11px;color:var(--diff-text);}
.nc{font-size:11px;color:var(--orange);font-style:italic;}
.sub{font-size:12px;color:var(--muted);margin-bottom:10px;padding:8px 12px;background:var(--s1);border-radius:6px;border:1px solid var(--border);}
.empty-row{text-align:center;padding:30px;color:var(--dim);font-size:13px;}

/* ── PROVIDER BADGES ── */
.pb{display:inline-block;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap;}
.pm{background:#dcfce7;color:#166534}
.ps{background:#dbeafe;color:#1d4ed8}
.pj{background:#fed7aa;color:#9a3412}
.pl{background:#ede9fe;color:#6d28d9}
.pia{background:#fce7f3;color:#9d174d}
.ptc{background:#e0f2fe;color:#0c4a6e}
.ptb{background:#fef3c7;color:#78350f}
.pcr{background:#f0fdf4;color:#14532d}
.pte{background:#fdf2f8;color:#6b21a8}
.psh{background:#f3e8ff;color:#6d28d9}

/* Stock badges */
.stk{font-family:'Space Mono',monospace;font-size:8px;padding:1px 5px;border-radius:2px;border:1px solid;margin-left:4px;}
.stk-s{color:#16a34a;border-color:#86efac;background:#f0fdf4;}
.stk-i{color:#ea580c;border-color:#fdba74;background:#fff7ed;}
.stk-n{color:var(--muted);border-color:var(--border);background:var(--s2);}

/* ── ADMIN PANEL ── */
.admin-wrap{max-width:800px;}
.info-box{background:var(--blue-dim);border:1px solid var(--blue);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--blue);margin-bottom:14px;line-height:1.6;}
.carga-sec{margin-bottom:20px;}
.carga-sec h2{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em;}
.carga-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;}
.card{background:var(--s1);border-radius:8px;padding:14px;border:1px solid var(--border);}
.card h3{font-size:12px;font-weight:600;margin-bottom:3px;display:flex;align-items:center;gap:7px;}
.card p{font-size:11px;color:var(--muted);margin-bottom:7px;}
.card textarea{width:100%;height:160px;padding:8px;border:1px solid var(--border);border-radius:5px;font-size:11px;font-family:monospace;resize:vertical;line-height:1.5;background:var(--s2);color:var(--text);}
.card textarea:focus{outline:none;border-color:var(--accent);}
.save-row{display:flex;justify-content:center;margin-top:14px;gap:10px;}
.smsg{font-family:'Space Mono',monospace;font-size:10px;margin-top:8px;padding:6px 10px;border-radius:3px;}
.smsg.ok{color:var(--accent);background:var(--accent-dim);}
.smsg.err{color:var(--orange);background:var(--orange-dim);}
.smsg.info{color:var(--blue);background:var(--blue-dim);}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:8px;width:100%;max-width:440px;transform:translateY(8px);transition:transform .2s;box-shadow:var(--shadow-lg);}
.overlay.open .modal{transform:translateY(0);}
.mhdr{padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.mtitle{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--accent);}
.mclose{background:transparent;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 5px;border-radius:2px;}
.mclose:hover{color:var(--text);background:var(--s2);}
.mbody{padding:16px;}
.mfoot{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.fg{margin-bottom:10px;}
.flabel{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;color:var(--muted);display:block;margin-bottom:4px;}
.finput,.fselect{width:100%;padding:7px 10px;background:var(--s2);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;transition:border-color .15s;}
.finput:focus,.fselect:focus{border-color:var(--accent);}
.fselect{cursor:pointer;}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">PRICE<em>BOARD</em></div>
  <div class="search-wrap">
    <span class="search-ico">⌕</span>
    <input id="searchInput" placeholder="Buscar modelo, color…" autocomplete="off">
  </div>

    <button class="btn btn-o" id="adminBtn" style="display:none" onclick="showTab('admin',document.querySelector('.tab.admin-tab'))">Panel Admin</button>

    <button class="theme-btn" onclick="toggleTheme()">☀️</button>
  </div>
</div>

<div class="lbar"><div class="lfill" id="topBar"></div></div>

<div class="tabs" id="tabs">

  <button class="tab" onclick="showTab('acc',this)">🔌 Accesorios</button>
  <button class="tab admin-tab" id="adminTab" style="display:none" onclick="showTab('admin',this)">⚙️ Admin</button>
</div>

<div class="wrap">
  <!-- IPHONE -->
  <div id="sec-iphone" class="sec on">
    <div class="bar">
      <select id="fi-model" onchange="renderCat('iphone')"><option value="">Todos los modelos</option></select>
      <select id="fi-cap" onchange="renderCat('iphone')"><option value="">Todas las caps.</option></select>
      <select id="fi-prov" onchange="renderCat('iphone')"><option value="">Todos los proveedores</option></select>

    <div id="wrap-iphone"></div>

  <!-- SAMSUNG -->
  <div id="sec-samsung" class="sec">
    <div class="bar">
      <select id="fs-model" onchange="renderCat('samsung')"><option value="">Todos los modelos</option></select>
      <select id="fs-prov" onchange="renderCat('samsung')"><option value="">Todos los proveedores</option></select>
    </div>
    <div id="wrap-samsung"></div>
  </div>
  <!-- GOOGLE -->
  <div id="sec-google" class="sec">
    <div class="bar">
      <select id="fg-prov" onchange="renderCat('google')"><option value="">Todos los proveedores</option></select>
    </div>
    <div id="wrap-google"></div>
  </div>
  <!-- MAC -->
  <div id="sec-mac" class="sec">
    <div class="bar">
      <select id="fm-model" onchange="renderCat('mac')"><option value="">Todos los modelos</option></select>
      <select id="fm-prov" onchange="renderCat('mac')"><option value="">Todos los proveedores</option></select>
    </div>
    <div id="wrap-mac"></div>
  </div>
  <!-- IPAD -->
  <div id="sec-ipad" class="sec">
    <div class="bar">
      <select id="fp-prov" onchange="renderCat('ipad')"><option value="">Todos los proveedores</option></select>
    </div>
    <div id="wrap-ipad"></div>
  </div>
  <!-- WATCH -->
  <div id="sec-watch" class="sec">
    <div class="bar">
      <select id="fw-prov" onchange="renderCat('watch')"><option value="">Todos los proveedores</option></select>
    </div>

  <!-- AIRPODS -->

  <!-- ADMIN -->
  <div id="sec-admin" class="sec">

      <div class="carga-sec">

          </div>
          <div class="card">

            <textarea id="txt-julian" placeholder="Pegá el mensaje completo de JULIÁN…"></textarea>
          </div>
        </div>
      </div>
      <div class="save-row">
        <button class="btn btn-o" onclick="clearAllWA()">🗑 Limpiar todo WA</button>

</div>

<!-- MODAL LOGIN -->
<div class="overlay" id="overlay">
  <div class="modal">

    </div>
    <div class="mbody" id="mbody"></div>
    <div class="mfoot" id="mfoot"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════
const CF_WORKER  = 'https://sweet-thunder-5881.tinstern.workers.dev';

function getDescuento(provider, category) {

  return prov[category] || 0;
}

const SHEETS_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQa-sWggZMfzoz1anCTUkqrVEDsRO7rzWJx_OVNOcbHlJugZQjufDldrolxV3qwfmz2LYehX4c736E/pub?output=csv&gid=';

function badgeCls(p) { return BADGE[p] || BADGE.DEFAULT; }

// ═══════════════════════════════════════

function colorBadge(text) {
  if (!text) return '';
  return text.split(/,|–|-(?=[A-Z])/).map(part => {
    const t = part.trim();
    if (!t || t.length < 2) return '';
    const key = t.toLowerCase().replace(/[^a-z ]/g,'').trim();
    const col = CMAP[key];
    if (col) {
      const isD = ['#111','#1f2937','#1e293b','#1c1917'].includes(col);
      const bg = isD ? '#f3f4f6' : col+'20';
      return `<span style="display:inline-block;padding:1px 7px;border-radius:999px;font-size:10px;color:${col};background:${bg};border:1px solid ${col}40;margin:1px 2px;font-weight:500">${t}</span>`;
    }
    return `<span style="font-size:11px;color:var(--muted);margin:0 2px">${t}</span>`;
  }).join('');
}

// ═══════════════════════════════════════
// NORMALIZER
// ═══════════════════════════════════════
function normalizeModel(raw) {
  let s = raw.toUpperCase().trim();
  // Strip emojis y no-ASCII primero
  s = s.replace(/[^ -~]/g, ' ').trim();
  // Strip asteriscos, comillas, puntos extra
  s = s.replace(/[*"'`]/g, ' ');
  // Strip paréntesis y contenido
  s = s.replace(/\s*\([^)]*\)/g, '').trim();
  // Strip marcadores al final
  s = s.replace(/\s*(NEW|ACTIVATED|OPEN BOX|SIN PRECINTOS|EUROPEO|REBAJA|SIM\s*\+\s*ESIM|ESIM|ONLY ESIM)\s*$/i, '').trim();
  s = s.replace(/\s+/g, ' ').trim();

  // ── iPhone: normalizar todas las variantes de "E" ──
  // "17 E", "17  E", "17 " E "", "17E" → todos a "17E"
  s = s.replace(/IPHONE\s*(\d+)\s+E\b/, 'IPHONE $1E');
  s = s.replace(/IPHONE\s*(\d+)E\b/, 'IPHONE $1E');
  // "IPHONE16" → "IPHONE 16"
  s = s.replace(/IPHONE(\d)/, 'IPHONE $1');
  s = s.replace(/\bPRO\s*MAX\b/g, 'PRO MAX');

  // ── Samsung: quitar RAM del nombre ──
  const smInternal = s.match(/\bS(\d{2})\b\s*(ULTRA|PLUS|FE|EDGE)?/g);
  if (/^SM\s*[-]/.test(s) && smInternal) {
    for (const m of smInternal) {
      const nm2 = m.match(/S(\d{2})\s*(ULTRA|PLUS|FE|EDGE)?/);
      if (nm2 && parseInt(nm2[1]) >= 20) {
        s = 'SAMSUNG S' + nm2[1] + (nm2[2] ? ' ' + nm2[2] : '');
        break;
      }
    }
  }
  s = s.replace(/\s+\d+\s*GB\s*\/\s*\d+\s*(GB|TB)/gi, '');
  s = s.replace(/\s+\d+\s*(GB|TB)(?=\s|$)/gi, '');
  if (/^SAMSUNG/.test(s)) {
    s = s.replace(/\s+(BLACK|WHITE|BLUE|VIOLET|SILVER|GRAY|GREY|PINK|GREEN|GOLD|TITANIUM|LAVENDER|TEAL|ORANGE|PURPLE|GRAPHITE|NAVY|ICE|JET).*$/i, '');
  }
  // Strip trailing numbers solo para Samsung (evita borrar "IPHONE 15" → "IPHONE")
  if (/^SAMSUNG|^S\d{2}/.test(s)) {
    s = s.replace(/\s+\d+\s*\+\s*$/, '').replace(/\s+\d+\s*$/, '').trim();
  }
  if (/^S\d{2}/.test(s) && !/^SAMSUNG/.test(s)) s = 'SAMSUNG ' + s;
  s = s.replace(/^GALAXY\s+/, 'SAMSUNG ');
  s = s.replace(/^GOOGLE\s+PIXEL/, 'PIXEL');

  return s.replace(/\s+/g, ' ').trim();
}

function detectCat(name) {
  const u = name.toUpperCase();
  if (/VIDRIO|GLASS|PROTECTOR|FUNDA|SPIGEN|CABLE|CARGADOR|AIRTAG|PENCIL|MAGSAFE|CASE|COVER|AURICULAR/.test(u)) return 'Accesorio';
  if (/IPHONE/.test(u)) return 'iPhone';
  if (/SAMSUNG|GALAXY|S2\d|S1\d/.test(u)) return 'Samsung';
  if (/PIXEL|GOOGLE/.test(u)) return 'Google';
  if (/AIRPOD/.test(u)) return 'AirPods';
  if (/WATCH/.test(u)) return 'Watch';
  if (/IPAD/.test(u)) return 'iPad';
  if (/MACBOOK/.test(u)) return 'Mac';
  if (/LENOVO|ASUS|HP |ACER|MSI|DELL|LAPTOP|NOTEBOOK/.test(u)) return 'Laptop';
  return 'Accesorio';
}

// ═══════════════════════════════════════
// PARSER SHEET CSV
// ═══════════════════════════════════════
function parseCSVLine(line) {
  const res=[]; let cur='',inQ=false;
  for (let i=0;i<line.length;i++) {
    const ch=line[i];
    if(ch==='"'){inQ=!inQ;continue;}
    if(ch===','&&!inQ){res.push(cur.trim());cur='';continue;}
    cur+=ch;
  }
  res.push(cur.trim());
  return res;
}

function parseSheetCSV(csvText, sheetName) {
  const lines = csvText.split(/\r?\n/).filter(l=>l.trim());
  const items = [];
  let curModel = null;

  for (const line of lines) {
    const cols = parseCSVLine(line);
    while (cols.length < 4) cols.push('');
    const col1=cols[1]||'', col2=cols[2]||'', col3=cols[3]||'';
    if (!col1) continue;
    if (/^https?:\/\//.test(col1)) continue;
    if (/^foto\s/i.test(col1)) continue;
    if (col2==='.') continue;
    if (/CONSULTAR/.test(col1.toUpperCase())&&!col2) continue;

    const hasPrice = /USD/i.test(col2);
    if (hasPrice) {
      const pm = col2.match(/(\d[\d.,]*)/);
      if (!pm) continue;
      const price = parseFloat(pm[1].replace(/\./g,'').replace(',','.'));
      let model = curModel, storage='', ram='', colors=[];

      const ramStorM = col1.match(/(\d+)\s*GB\s*\/\s*(\d+)\s*(GB|TB)/i);
      const storM    = col1.match(/(\d+)\s*(GB|TB)/i);

      if (ramStorM) {
        ram = ramStorM[1]+'GB';
        storage = ramStorM[2]+ramStorM[3].toUpperCase();
        const ai = col1.indexOf(ramStorM[0])+ramStorM[0].length;
        colors = col1.slice(ai).trim().split(/[-,\s]{2,}|\s{3,}/).map(c=>c.trim()).filter(Boolean);
        if (!model) model = col1.slice(0,col1.indexOf(ramStorM[0])).replace(/\s+/g,' ').trim().toUpperCase()||sheetName.toUpperCase();
      } else if (storM) {
        storage = storM[1]+storM[2].toUpperCase();
        const ai = col1.toLowerCase().lastIndexOf(storM[0].toLowerCase())+storM[0].length;
        colors = col1.slice(ai).replace(/^\s*GB\s*/i,'').trim().split(/[-,]|\s{2,}/).map(c=>c.trim()).filter(Boolean);
        if (!model) model = col1.slice(0,col1.toLowerCase().indexOf(storM[0].toLowerCase())).replace(/\s+/g,' ').trim().toUpperCase()||sheetName.toUpperCase();
      } else {
        if (!model) model = col1.toUpperCase().trim();
      }
      if (!model) continue;
      const normModel = normalizeModel(model);
      const status = (col3||'STK').toUpperCase().trim();
      items.push({id:uid(),provider:'MAURO',sheetName,category:detectCat(normModel),model:normModel,storage,ram,price,currency:'USD',colors,status:status==='NO'?'NO':status==='ING'?'ING':'STK',notes:''});
    } else if (!col2) {
      curModel = col1.toUpperCase().trim();
    }
  }
  return items;
}

// ═══════════════════════════════════════
// PARSER WHATSAPP
// ═══════════════════════════════════════
function cleanWA(s) {
  return s.replace(/\*/g,'').replace(/[😃🔥📱🎧🔹🔶🔷🇺🇸‼️💸📄ℹ️🏆❗💰·]/gu,'').replace(/\s+/g,' ').trim();
}

function parseWhatsApp(text, prov) {
  const lines = text.split('\n').map(l=>cleanWA(l)).filter(l=>l.length>1);
  const items = [];
  let model=null, cat=null;
  const reModel   = /^(IPHONE|SAMSUNG|GALAXY|GOOGLE\s*PIXEL|PIXEL|AIRPOD|WATCH|IPAD|MACBOOK|S2\d|S1\d)/i;
  const reStorFst = /^(\d+(?:\/\d+)?(?:GB|TB)|1TB)/i;
  const reSamL    = /(\d+)\s*\+\s*(\d+(?:GB|TB)|1TB)/i;
  const rePrice   = /[uU]\$\s*([\d.,]+)|[＄$]\s*(\d+)/;

  for (let i=0;i<lines.length;i++) {
    const line=lines[i];
    if (!line) continue;
    if (reModel.test(line)&&!reStorFst.test(line)&&!reSamL.test(line)) {
      model=normalizeModel(line.replace(/[^a-zA-Z0-9\s\-\/""()]+/g,'').trim());
      cat=detectCat(model); continue;
    }
    if (!model) continue;

    // Samsung inline "S26 PLUS 12 + 256GB. *u$ 975*"
    const mSJ=reSamL.exec(line);
    if (mSJ) {
      const pm=rePrice.exec(line); if (!pm) continue;
      const price=parseFloat((pm[1]||pm[2]).replace(/\./g,'').replace(',','.'));
      const ram=mSJ[1]+'GB', storage=mSJ[2].toUpperCase().replace(/\s/g,'');
      const colLine=lines[i+1]||'';
      const colors=(!reStorFst.test(colLine)&&!reModel.test(colLine)&&colLine.length<70)?colLine.split(/[-,]/).map(c=>c.trim()).filter(Boolean):[];
      items.push({id:uid(),provider:prov,sheetName:'',category:cat,model,storage,ram,price,currency:'USD',colors,status:'ok',notes:/canada/i.test(line)?'Canada Spec':''});
      continue;
    }
    // Storage al inicio "128GB. - u$ 635 ( White )"
    if (reStorFst.test(line)) {
      const pm=rePrice.exec(line); if (!pm) continue;
      const price=parseFloat((pm[1]||pm[2]).replace(/\./g,'').replace(',','.'));
      const storRaw=line.match(reStorFst)[1];
      let ram='',storage='';
      if (storRaw.includes('/')){[ram,storage]=storRaw.split('/');ram+='GB';storage=storage.toUpperCase().replace(/\s/g,'');}
      else storage=storRaw.toUpperCase().replace(/\s/g,'');
      const cInline=line.match(/\(([^)]+)\)/);
      let colors=[];
      if (cInline) colors=cInline[1].split(/[-,]/).map(c=>c.trim()).filter(Boolean);
      else {
        const cl=lines[i+1]||'';
        if (!reStorFst.test(cl)&&!reModel.test(cl)&&cl.length<70&&!/u\$/i.test(cl))
          colors=cl.split(/[-,]/).map(c=>c.trim()).filter(Boolean);
      }
      const notes=/NEW sin precintos/i.test(line)?'Sin precinto':/open box/i.test(line)?'Open Box':/activated/i.test(line)?'Activated':'';
      items.push({id:uid(),provider:prov,sheetName:'',category:cat,model,storage,ram,price,currency:'USD',colors,status:'ok',notes});
      continue;
    }
    // Accesorio inline
    const mAcc=line.match(/^(.+?)\s*[\.\-]+\s*[uU]\$\s*([\d.,]+)/);
    if (mAcc) {
      const price=parseFloat(mAcc[2].replace(/\./g,'').replace(',','.'));
      const nm=normalizeModel(mAcc[1].trim());
      items.push({id:uid(),provider:prov,sheetName:'',category:detectCat(nm),model:nm,storage:'',ram:'',price,currency:'USD',colors:[],status:'ok',notes:''});
    }
  }
  return items;
}

async function fetchSheet(gid, name) {
  const res = await fetch(CF_WORKER + '?gid=' + gid);
  if (!res.ok) throw new Error('HTTP '+res.status);
  return parseSheetCSV(await res.text(), name);
}

async function readGist() {
  try {
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`,{headers:{'Accept':'application/vnd.github+json'}});
    if (!res.ok) return [];
    const data = await res.json();
    const content = data.files?.[GIST_FILE]?.content;
    if (!content) return [];
    return JSON.parse(content);
  } catch(e) { return []; }
}

async function writeGist(items) {
  if (!GH_TOKEN) throw new Error('Sin token');
  const res = await fetch(`https://api.github.com/gists/${GIST_ID}`,{
    method:'PATCH',
    headers:{'Authorization':'Bearer '+GH_TOKEN,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
    body: JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(items,null,2)}}})
  });
  if (!res.ok) { const e=await res.json(); throw new Error(e.message||'Error Gist'); }
}

async function refreshAll() {
  const btn=document.getElementById('refreshBtn');
  const bar=document.getElementById('topBar');
  btn.disabled=true; bar.style.width='10%';
  let items=[];
  for (let i=0;i<SHEETS.length;i++) {
    bar.style.width=Math.round(10+(i/SHEETS.length)*70)+'%';
    try { items.push(...await fetchSheet(SHEETS[i].gid, SHEETS[i].name)); } catch(e){}
  }
  bar.style.width='88%';
  const waItems = await readGist();
  listings = [...items, ...waItems];
  bar.style.width='100%';
  updateTs();
  buildFilters();
  renderAll();
  setTimeout(()=>{bar.style.width='0%';btn.disabled=false;},600);
}

function buildFilters() {

    const el=document.getElementById(id);

    el.innerHTML=`<option value="">${label}</option>`+vals.map(v=>`<option>${v}</option>`).join('');

  // iPhone

  const ipCaps=[...new Set(listings.filter(CAT_MAP.iphone).map(l=>l.storage).filter(Boolean))].sort((a,b)=>capRank(a)-capRank(b));
  const ipProvs=[...new Set(listings.filter(CAT_MAP.iphone).map(l=>l.provider))].sort();
  fillSelect('fi-model',ipModels,'Todos los modelos');
  fillSelect('fi-cap',ipCaps,'Todas las caps.');
  fillSelect('fi-prov',ipProvs,'Todos los proveedores');
  // Samsung
  const samModels=[...new Set(listings.filter(CAT_MAP.samsung).map(l=>l.model))].sort((a,b)=>modelRank(a,ORDER_SAM)-modelRank(b,ORDER_SAM));
  fillSelect('fs-model',samModels,'Todos los modelos');
  fillSelect('fs-prov',[...new Set(listings.filter(CAT_MAP.samsung).map(l=>l.provider))],'Todos los proveedores');
  // Others
  [['fg-prov','google'],['fm-model',null],['fm-prov','mac'],['fp-prov','ipad'],['fw-prov','watch'],['fa-prov','airpods'],['fl-prov','laptop'],['fac-prov','acc']].forEach(([id,cat])=>{
    if (!cat) return;
    const provs=[...new Set(listings.filter(CAT_MAP[cat]).map(l=>l.provider))].sort();
    fillSelect(id,provs,'Todos los proveedores');
  });
  const macModels=[...new Set(listings.filter(CAT_MAP.mac).map(l=>l.model))].sort();
  fillSelect('fm-model',macModels,'Todos los modelos');
}

function getSearch(l) {
  if (!searchQ) return true;
  const q=searchQ.toLowerCase();
  return l.model.toLowerCase().includes(q)||l.provider.toLowerCase().includes(q)||l.storage.toLowerCase().includes(q)||l.colors.join(' ').toLowerCase().includes(q);
}

function renderCatTable(cat, data, keyFn, sortFn, cols) {
  const wrapId='wrap-'+cat;
  const wrap=document.getElementById(wrapId);
  if (!wrap) return;

  // Calcular mínimos por key
  const mins={};
  data.forEach(l=>{const d=getDescuento(l.provider,l.category);const fp=l.price-d;const k=keyFn(l);if(!mins[k]||fp<mins[k])mins[k]=fp;});

  // Agrupar por modelo
  const models=[...new Set(data.map(l=>l.model))];
  if (cat==='iphone') models.sort((a,b)=>modelRank(a,ORDER_IP)-modelRank(b,ORDER_IP));
  else if (cat==='samsung') models.sort((a,b)=>modelRank(a,ORDER_SAM)-modelRank(b,ORDER_SAM));
  else models.sort();

  if (!models.length) {
    wrap.innerHTML=`<table><tbody><tr><td class="empty-row" colspan="8">Sin datos. Actualizá el catálogo.</td></tr></tbody></table>`;
    return;
  }

  const thHtml=cols.map(c=>`<th>${c}</th>`).join('');
  let html=`<table><thead><tr><th style="width:14px"></th>${thHtml}</tr></thead><tbody>`;

  models.forEach(model=>{
    const rows=data.filter(l=>l.model===model);
    rows.sort(sortFn);
    html+=`<tr class="g"><td colspan="${cols.length+1}">${model}</td></tr>`;
    rows.forEach(l=>{
      const k=keyFn(l);
      const desc = getDescuento(l.provider, l.category);
      const finalPrice = l.price - desc;
      const best=finalPrice===mins[k];
      const diff=finalPrice-mins[k];
      const diffHtml=diff===0?`<span class="ok">mejor precio</span>`:`<span class="dn">+$${diff}</span>`;
      const storDisp=l.ram?`${l.ram}/${l.storage}`:l.storage;
      const stBadge=l.status==='STK'?`<span class="stk stk-s">STK</span>`:l.status==='ING'?`<span class="stk stk-i">ING</span>`:l.status==='NO'?`<span class="stk stk-n">NO</span>`:'';
      const noteBadge=l.notes?`<span class="nc">${l.notes}</span>`:'';
      const colorsHtml=colorBadge(l.colors.join(', '));
      const precioHtml=desc>0
        ? `<span class="lp">$${l.price}</span><span class="pv">USD ${finalPrice.toLocaleString('es-AR')}</span>`
        : `<span class="pv">USD ${finalPrice.toLocaleString('es-AR')}</span>`;
      html+=`<tr class="${best?'best':''}">
        <td style="width:14px">${best?`<span class="star">★</span>`:''}</td>
        <td></td>
        <td><span style="font-size:12px;color:var(--muted)">${storDisp}</span></td>
        <td><span class="pb ${badgeCls(l.provider)}">${l.provider}${l.sheetName?' / '+l.sheetName:''}</span></td>
        <td>${precioHtml}${stBadge}</td>
        <td>${diffHtml}</td>
        <td>${noteBadge}</td>
        <td>${colorsHtml}</td>
      </tr>`;
    });
  });
  html+='</tbody></table>';
  wrap.innerHTML=html;
}

function renderCat(cat) {
  let filt = listings.filter(CAT_MAP[cat]).filter(getSearch);

  if (cat==='iphone') {
    const m=document.getElementById('fi-model').value;
    const c=document.getElementById('fi-cap').value;
    const p=document.getElementById('fi-prov').value;
    if(m) filt=filt.filter(l=>l.model===m);
    if(c) filt=filt.filter(l=>l.storage===c);
    if(p) filt=filt.filter(l=>l.provider===p);
    renderCatTable(cat,filt,l=>l.model+'|'+l.storage,(a,b)=>capRank(a.storage)-capRank(b.storage)||a.price-b.price,['Modelo','Cap.','Proveedor','Precio','vs mejor','Nota','Colores']);
  }
  else if (cat==='samsung') {
    const m=document.getElementById('fs-model').value;
    const p=document.getElementById('fs-prov').value;
    if(m) filt=filt.filter(l=>l.model===m);
    if(p) filt=filt.filter(l=>l.provider===p);
    renderCatTable(cat,filt,l=>l.model+'|'+l.storage,(a,b)=>capRank(a.storage)-capRank(b.storage)||a.price-b.price,['Modelo','Cap.','Proveedor','Precio','vs mejor','Nota','Colores']);
  }
  else if (cat==='google') {
    const p=document.getElementById('fg-prov').value;
    if(p) filt=filt.filter(l=>l.provider===p);
    renderCatTable(cat,filt,l=>l.model+'|'+l.storage,(a,b)=>a.price-b.price,['Modelo','Cap.','Proveedor','Precio','vs mejor','Nota','Colores']);
  }
  else if (cat==='mac') {
    const m=document.getElementById('fm-model').value;
    const p=document.getElementById('fm-prov').value;
    if(m) filt=filt.filter(l=>l.model===m);
    if(p) filt=filt.filter(l=>l.provider===p);
    renderCatTable(cat,filt,l=>l.model+'|'+l.storage,(a,b)=>a.price-b.price,['Modelo','Specs','Proveedor','Precio','vs mejor','Nota','Colores']);
  }
  else {
    const provSelId={'ipad':'fp-prov','watch':'fw-prov','airpods':'fa-prov','laptop':'fl-prov','acc':'fac-prov'}[cat];
    const p=provSelId?document.getElementById(provSelId).value:'';
    if(p) filt=filt.filter(l=>l.provider===p);
    renderCatTable(cat,filt,l=>l.model+'|'+l.storage,(a,b)=>a.price-b.price,['Modelo','Cap.','Proveedor','Precio','vs mejor','Nota','Colores']);
  }
}

function renderAll() {
  ['iphone','samsung','google','mac','ipad','watch','airpods','laptop','acc'].forEach(renderCat);
}

function showTab(id, btn) {
  document.querySelectorAll('.sec').forEach(s=>s.style.display='none');
  document.querySelectorAll('.sec.on').forEach(s=>s.classList.remove('on'));
  const sec=document.getElementById('sec-'+id);
  if(sec){sec.style.display='';sec.classList.add('on');}
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  activeTab=id;
}

function openLoginModal() {
  if (isAdmin) return;
  document.getElementById('mtitle').textContent='ACCESO ADMIN';
  document.getElementById('mbody').innerHTML=`
    <div class="fg"><label class="flabel">CLAVE</label><input class="finput" id="pi" type="password" placeholder="••••••" autocomplete="off"></div>
    <div class="fg"><label class="flabel">GITHUB TOKEN</label><input class="finput" id="ti" type="password" placeholder="ghp_…" autocomplete="off"></div>
    <div id="lmsg"></div>`;
  document.getElementById('mfoot').innerHTML=`
    <button class="btn btn-g" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-p" onclick="doLogin()">Entrar</button>`;
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('pi').focus(),100);
}
function doLogin() {
  const pass=document.getElementById('pi').value;
  const token=document.getElementById('ti').value;
  if (pass!==ADMIN_PASS) { document.getElementById('lmsg').innerHTML=`<div class="smsg err">Clave incorrecta.</div>`; return; }
  GH_TOKEN=token; isAdmin=true;
  document.getElementById('adminBadge').style.display='inline';
  document.getElementById('adminBtn').style.display='inline-flex';
  document.getElementById('adminTab').style.display='';
  document.getElementById('loginBtn').style.display='none';
  closeModal();
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }

// ═══════════════════════════════════════
// ADMIN: GUARDAR WA
// ═══════════════════════════════════════
async function saveAllWA() {
  const btn=document.getElementById('saveBtn');
  const msg=document.getElementById('admin-msg');
  btn.disabled=true; btn.textContent='Guardando…';
  try {
    const svetText=document.getElementById('txt-svet').value;
    const julianText=document.getElementById('txt-julian').value;
    let newItems=[];
    if (svetText.trim()) newItems.push(...parseWhatsApp(svetText,'SVET'));
    if (julianText.trim()) newItems.push(...parseWhatsApp(julianText,'JULIAN'));
    if (!newItems.length) { msg.innerHTML=`<div class="smsg err">Sin productos detectados.</div>`; return; }
    // Leer Gist actual, reemplazar SVET y JULIAN, guardar
    const current=await readGist();
    const provs=new Set(newItems.map(l=>l.provider));
    const updated=[...current.filter(l=>!provs.has(l.provider)||l.provider==='MAURO'),...newItems];
    await writeGist(updated);
    listings=listings.filter(l=>!provs.has(l.provider));
    listings.push(...newItems);
    buildFilters(); renderAll();
    msg.innerHTML=`<div class="smsg ok">✓ ${newItems.length} productos guardados. Vendedores verán los cambios al actualizar.</div>`;
  } catch(e) {
    msg.innerHTML=`<div class="smsg err">✗ ${e.message}</div>`;
  }
  btn.disabled=false; btn.textContent='Guardar en Gist';
}

async function clearAllWA() {
  if (!confirm('¿Limpiar todos los datos de WhatsApp del Gist?')) return;
  try {
    await writeGist([]);
    listings=listings.filter(l=>l.provider==='SHEET');
    buildFilters(); renderAll();
    document.getElementById('admin-msg').innerHTML=`<div class="smsg ok">✓ Datos WA eliminados.</div>`;
  } catch(e) {
    document.getElementById('admin-msg').innerHTML=`<div class="smsg err">✗ ${e.message}</div>`;
  }
}
